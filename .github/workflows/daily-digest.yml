name: Daily Agents Radar

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    # Web content fetching adds ~60-120 s of HTTP requests on incremental runs;
    # the first-ever run (fetching 50 articles) may need up to 20 min.
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build daily picks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_PROVIDER: deepseek
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: deepseek-v4-flash
        run: pnpm exec tsx src/daily-picks.ts

      - name: Commit digest files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digests/
          if git diff --cached --quiet; then
            echo "No new digest files to commit"
          else
            DATE=$(date -u +%Y-%m-%d)
            HUSKY=0 git commit -m "digest: ${DATE} daily picks"
            git pull --rebase
            git push
          fi

      - name: Prepare email
        id: email
        run: |
          REPORT="digests/$(date -u +%Y-%m-%d)/daily-picks.md"
          echo "report=$REPORT" >> "$GITHUB_OUTPUT"

      - name: Send daily picks email
        uses: dawidd6/action-send-mail@v3
        env:
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ env.SMTP_PASS }}
          subject: "信息雷达｜今日 5 条推荐"
          to: sanjing@netopstec.com
          from: ${{ secrets.SMTP_FROM }}
          body: "Today's five recommended links are attached as a Markdown report."
          attachments: ${{ steps.email.outputs.report }}
