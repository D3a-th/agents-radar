name: Daily Agents Radar

on:
  schedule:
    # 每天 00:00 UTC = 08:00 CST (UTC+8)
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build daily picks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_PROVIDER: deepseek
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: deepseek-v4-flash
        run: pnpm exec tsx src/daily-picks.ts

      - name: Commit daily picks
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digests/
          if git diff --cached --quiet; then
            echo "No new daily picks to commit"
          else
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "digest: ${DATE} daily picks"
            git pull --rebase
            git push
          fi

      - name: Prepare email
        id: email
        run: |
          REPORT="digests/$(date -u +%Y-%m-%d)/daily-picks.md"
          echo "report=${REPORT}" >> "${GITHUB_OUTPUT}"
          echo "body<<EOF" >> "${GITHUB_OUTPUT}"
          cat "${REPORT}" >> "${GITHUB_OUTPUT}"
          echo "EOF" >> "${GITHUB_OUTPUT}"

      - name: Send daily picks email
        uses: dawidd6/action-send-mail@v3
        env:
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ env.SMTP_PASS }}
          subject: "信息雷达｜今日 5 条推荐"
          to: sanjing@netopstec.com
          from: ${{ secrets.SMTP_FROM }}
          body: ${{ steps.email.outputs.body }}
          attachments: ${{ steps.email.outputs.report }}
